spring.application.name=demoredis
# spring.data.redis.host=127.0.0.1
# spring.data.redis.port=6379
# spring.data.redis.timeout=2s

# RTWB Redis (optional) — the custom Jedis factory reads these keys when
# `SPRING.CACHE.RTWB.store=REDIS` is set. Values ending with `.DEFAULT` are
# looked up by the factory; if absent the factory falls back to the
# `spring.data.redis.*` values or sensible hardcoded defaults.
# 
# When you uncomment RTWB properties below:
# 1. Keep the active spring.data.redis.* values above intact (for fallback).
# 2. Uncomment `SPRING.CACHE.RTWB.store=REDIS` to enable the RTWB factory.
# 3. The factory will prefer RTWB values, then fall back to spring.data.redis.*.
#
# Example (uncomment to enable RTWB):
SPRING.CACHE.RTWB.store=REDIS
SPRING.CACHE.RTWB.redis.host.DEFAULT=127.0.0.1
SPRING.CACHE.RTWB.redis.port.DEFAULT=6379
# password is optional; leave blank (empty) if your Redis server requires no authentication
SPRING.CACHE.RTWB.redis.password.DEFAULT=
SPRING.CACHE.RTWB.redis.connect-timeout.DEFAULT=2000    # milliseconds
SPRING.CACHE.RTWB.redis.read-timeout.DEFAULT=2000       # milliseconds
SPRING.CACHE.RTWB.redis.earlyStartup=0                  # 1 to enable
SPRING.CACHE.RTWB.redis.ssl.enable=0                    # 1 to enable SSL
SPRING.CACHE.RTWB.redis.ssl.truststore.path=            # path to truststore (when ssl.enable=1)
SPRING.CACHE.RTWB.redis.ssl.truststore.password=        # truststore password
SPRING.CACHE.RTWB.redis.keystoreInstance=JKS           # optional keystore type
SPRING.CACHE.RTWB.redis.sslContextInstance=TLS         # SSL context

# Jedis pool tuning (defaults used when missing):
SPRING.CACHE.RTWB.redis.jedis.pool.max-total.DEFAULT=8
SPRING.CACHE.RTWB.redis.jedis.pool.max-idle.DEFAULT=8
SPRING.CACHE.RTWB.redis.jedis.pool.min-idle.DEFAULT=0
SPRING.CACHE.RTWB.redis.jedis.pool.block-when-exhausted=0
SPRING.CACHE.RTWB.redis.jedis.pool.max-wait-millis.DEFAULT=1000
SPRING.CACHE.RTWB.redis.jedis.pool.min-evictable-idle-time-millis.DEFAULT=60000
SPRING.CACHE.RTWB.redis.jedis.pool.time-between-eviction-runs-millis.DEFAULT=30000
SPRING.CACHE.RTWB.redis.jedis.pool.test-on-borrow.DEFAULT=0
SPRING.CACHE.RTWB.redis.jedis.pool.test-while-idle.DEFAULT=0
SPRING.CACHE.RTWB.redis.jedis.pool.test-on-return.DEFAULT=0
SPRING.CACHE.RTWB.redis.jedis.pool.num-tests-per-eviction-run.DEFAULT=3

# Enable the RTWB path at runtime with an argument, e.g.
# java -jar target/demoredis-0.0.1-SNAPSHOT.jar --SPRING.CACHE.RTWB.store=REDIS


# mvn spring-boot:run -Dspring-boot.run.profiles=test -Dspring-boot.run.arguments="--app.seed=true"